version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: fill_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  fill-app:
    build: ./backend
    container_name: fill_app
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017
    volumes:
      - ./backend/log:/app/log
      
  fill-dashboard:
    build: ./frontend
    container_name: fill_dashboard
    ports:
      - "8080:80"
    depends_on:
      - fill-app

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: fill_mongo_express
    ports:
      - "8081:8081"
    depends_on:
      - mongo
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin

  fill-agent:
    build: ./agent
    container_name: fill_agent
    working_dir: /agent
    stdin_open: true
    tty: true
    environment:
      - OPENAI_API_KEY_FILE=/agent/openai.credential
      - OPENAI_MODEL=gpt-5-mini
      - AGENT_HTTP_HOST=0.0.0.0
      - AGENT_HTTP_PORT=8090
    volumes:
      - ./agent:/agent
    ports:
      - "8090:8090"

  fill-chat:
    build: ./chat
    container_name: fill_chat
    ports:
      - "8091:80"
    depends_on:
      - fill-agent

  iexplain:
    image: ejhusom/iexplain:latest
    container_name: iexplain
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./workspace/iexplain-workspace:/app/workspace
      - ./workspace/iexplain-logs:/app/logs
      - ./workspace/skills:/app/skills
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
volumes:
  mongo-data:
